seed:
  # 种子语义：一次"5 种子实验"中，第 s 次运行令
  #   seed.data = seed.model = seed.routing = s
  # 即一个 eval seed 同步驱动全部随机源（见 完整工作流.md §4）。
  # run.sh <stage> <seed> 会同时覆盖下面三条链。
  data: 0           # 数据生成种子链
  model: 0          # 模型初始化种子链
  routing: 0        # 路由训练种子链
  eval_seeds: [0, 1, 2, 3, 4]  # 5 个独立实验种子（7.1 / 7.10），逐个跑 run.sh <stage> s

# ——— 数据时间与空间（P1–P3）———
data:
  timeslot_minutes: 3         # Δt = 3 min（4.1.4）
  history_window_W: 30        # 90 min（4.1.4）
  forecast_horizons: [1, 3]   # H（5.4）
  quantiles: [0.05, 0.50, 0.95]
  train_val_calib_test: [0.60, 0.15, 0.10, 0.15]  # 4.2 步骤2

geant:
  file: directed-geant-uhlig-15min-over-4months-ALL-native.tgz
  granularity_min: 15
  unit: MBITPERSEC
  n_matrices_expected: 11460  # 标称值；实际 10773（原始数据有缺口）

abilene:
  file: directed-abilene-zhang-5min-over-6months-ALL-native.tgz
  granularity_min: 5
  n_matrices_expected: 48096

worldpop:
  file: global_pop_2025_CN_1km_R2025A_v1.tif
  nodata: -99999
  resolution_deg: 0.0083333333

# ——— 星座（P2）———
constellation:
  n_sat: 66
  # Walker Delta 6/66/F=2（Iridium 类，P2 决策，技术大纲未指定 F）
  walker:
    planes: 6
    sats_per_plane: 11
    inclination_deg: 53.0
    altitude_km: 550
    f: 2
  neighbors: 4
  min_elevation_deg: 5.0     # 地面覆盖最小仰角（P2 决策：10°仅84%覆盖，5°达96%）
  link_capacity_gbps: 10.0   # 星间链路容量，P3 标定可调
  max_isl_distance_km: 5000.0  # ISL 最大距离阈值

# ——— OD 标定（P3）———
demand:
  diurnal_amplitude_a: 0.4    # 0.3–0.5（4.1.4）
  burst_multiplier: 4.0       # 4.5.1
  k0: 4.0614166259765625      # P4 ECMP refine 回填（P95≈0.45，中负载）
  # 混合 OD 模型三股比例（P3 决策，π_rand+π_grav+π_hot=1）
  od_mix:
    random: 0.4
    gravity: 0.4
    hotspot: 0.2
  od_gravity_gamma: 1.5       # 重力模型距离衰减（地面大圆距离）
  od_n_hotspots: 10           # 自动选热点对数
  coverage_recompute_every: 10  # 覆盖映射每 N 时隙重算一次（P3 实测每时隙算也仅0.9ms，此参数保留）

# ——— 缺失与故障（P5）———
missing:
  mcar_rates: [0.20, 0.40]
  mar_target_rate: 0.20
  block_length: 10

failure:
  link_failure_rate: 0.10

# ——— 预测（P7）———
predict:
  target_coverage: 0.90       # 1-α
  cong_threshold_ratio: 0.8   # C_thr = 0.8*C_ij（5.6）

# ——— 硬件（7.1）———
hardware:
  device: mps                 # 回退 cpu
  max_memory_gb: 24
